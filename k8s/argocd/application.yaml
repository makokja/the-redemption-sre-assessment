apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redemption
  namespace: argocd
  # Finalizer to ensure proper cleanup
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/your-org/the-redemption-sre-assessment
    targetRevision: main
    path: k8s/helm/redemption
    helm:
      valueFiles:
        - values.yaml
      # Override values for specific environments
      parameters:
        - name: replicaCount
          value: "3"
        - name: image.tag
          value: "latest"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: redemption
  
  syncPolicy:
    automated:
      prune: true  # Remove resources that are no longer in Git
      selfHeal: true  # Auto-sync when cluster state drifts
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Health assessment for custom resources
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore replica count (managed by HPA)
