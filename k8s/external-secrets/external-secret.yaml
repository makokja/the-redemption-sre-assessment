apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redemption-secrets
  namespace: redemption
spec:
  # Refresh secrets every 1 hour
  refreshInterval: 1h
  
  # Reference to the SecretStore
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  
  # Target Kubernetes Secret to create
  target:
    name: redemption-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Database credentials
        DB_HOST: "{{ .db_host }}"
        DB_PORT: "{{ .db_port }}"
        DB_NAME: "{{ .db_name }}"
        DB_USER: "{{ .db_user }}"
        DB_PASSWORD: "{{ .db_password }}"
        
        # Redis credentials
        REDIS_HOST: "{{ .redis_host }}"
        REDIS_PORT: "{{ .redis_port }}"
        REDIS_PASSWORD: "{{ .redis_password }}"
  
  # Data to fetch from AWS Secrets Manager
  data:
    # Database secrets
    - secretKey: db_host
      remoteRef:
        key: redemption/database
        property: host
    
    - secretKey: db_port
      remoteRef:
        key: redemption/database
        property: port
    
    - secretKey: db_name
      remoteRef:
        key: redemption/database
        property: name
    
    - secretKey: db_user
      remoteRef:
        key: redemption/database
        property: username
    
    - secretKey: db_password
      remoteRef:
        key: redemption/database
        property: password
    
    # Redis secrets
    - secretKey: redis_host
      remoteRef:
        key: redemption/redis
        property: host
    
    - secretKey: redis_port
      remoteRef:
        key: redemption/redis
        property: port
    
    - secretKey: redis_password
      remoteRef:
        key: redemption/redis
        property: password
