{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "redemption.fullname" . }}
  namespace: {{ .Values.namespace | default "redemption" }}
  labels:
    {{- include "redemption.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "redemption.selectorLabels" . | nindent 6 }}
{{- end }}
