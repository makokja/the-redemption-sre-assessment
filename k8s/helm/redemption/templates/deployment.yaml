apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redemption.fullname" . }}
  namespace: {{ .Values.namespace | default "redemption" }}
  labels:
    {{- include "redemption.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # zero downtime deployments
  selector:
    matchLabels:
      {{- include "redemption.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "redemption.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        env:
        {{- range .Values.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- if .Values.externalSecrets.enabled }}
        # Database connection from AWS Secrets Manager via External Secrets
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: DB_PASSWORD
        # Redis connection from AWS Secrets Manager via External Secrets
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redemption-secrets
              key: REDIS_PASSWORD
        {{- else }}
        # Fallback to hardcoded secrets (not recommended for production)
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: {{ include "redemption.fullname" . }}-secrets
              key: dbHost
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: {{ include "redemption.fullname" . }}-secrets
              key: dbPort
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: {{ include "redemption.fullname" . }}-secrets
              key: redisHost
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]  # graceful shutdown
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
