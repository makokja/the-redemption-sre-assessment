# Redemption service Helm values
replicaCount: 3

image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/redemption
  pullPolicy: Always
  tag: "latest"

serviceAccount:
  create: true
  name: "redemption-sa"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/redemption-app-role"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  metricsPort: 9090  # Prometheus metrics

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/load-balancer-attributes: deletion_protection.enabled=true
  hosts:
    - host: redemption.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# HPA configuration for handling traffic spikes
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 10
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min

nodeSelector:
  workload: redemption

tolerations:
  - key: workload
    operator: Equal
    value: redemption
    effect: NoSchedule

# Spread pods across nodes and zones
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - redemption
        topologyKey: kubernetes.io/hostname
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - redemption
        topologyKey: topology.kubernetes.io/zone

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Network policies for security
networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from AWS ALB (targets pods directly by IP)
    - ports:
      - protocol: TCP
        port: 8080
  egress:
    # Database and cache
    - ports:
      - protocol: TCP
        port: 5432
      - protocol: TCP
        port: 6379
    # External services
    - ports:
      - protocol: TCP
        port: 443
      - protocol: TCP
        port: 53
      - protocol: UDP
        port: 53

env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "info"
  - name: METRICS_PORT
    value: "9090"

# External Secrets configuration (AWS Secrets Manager)
externalSecrets:
  enabled: true  # Set to false to use hardcoded secrets (not recommended)
  region: us-east-1
  secretStore:
    name: aws-secrets-manager
  secrets:
    # AWS Secrets Manager secret paths
    database: "redemption/database"  # Contains: host, port, name, username, password
    redis: "redemption/redis"        # Contains: host, port, password

# Fallback secrets (only used when externalSecrets.enabled=false)
# NOT RECOMMENDED FOR PRODUCTION - Use AWS Secrets Manager instead
secrets:
  dbHost: ""
  dbPort: "5432"
  dbName: "redemption"
  redisHost: ""
  redisPort: "6379"
